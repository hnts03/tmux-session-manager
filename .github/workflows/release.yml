name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: ver
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build .deb
        run: |
          V="${{ steps.ver.outputs.VERSION }}"
          sed -i "s/^Version: .*/Version: $V/" packaging/debian/DEBIAN/control
          mkdir -p packaging/debian/usr/local/bin
          cp bin/tsm packaging/debian/usr/local/bin/tsm
          chmod 755 packaging/debian/usr/local/bin/tsm
          dpkg-deb --build packaging/debian "tsm_${V}_all.deb"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            tsm_${{ steps.ver.outputs.VERSION }}_all.deb
            bin/tsm

      - name: Compute tarball SHA256
        id: sha
        run: |
          SHA=$(curl -fsSL \
            "https://github.com/${{ github.repository }}/archive/refs/tags/${{ github.ref_name }}.tar.gz" \
            | sha256sum | awk '{print $1}')
          echo "SHA256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Update & commit formula on main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          V="${{ steps.ver.outputs.VERSION }}"
          SHA="${{ steps.sha.outputs.SHA256 }}"
          # Apply the edit onto the latest main tip so there is no rebase/conflict.
          git fetch origin main
          git checkout -B main origin/main
          sed -i "s/version \"[^\"]*\"/version \"$V\"/" Formula/tsm.rb
          sed -i "s/sha256 \"[^\"]*\"/sha256 \"$SHA\"/" Formula/tsm.rb
          git add Formula/tsm.rb
          git diff --cached --quiet && exit 0
          git commit -m "chore: update formula for ${{ github.ref_name }}"
          git push origin HEAD:main
