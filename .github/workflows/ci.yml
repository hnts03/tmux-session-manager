name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          # zsh + fish let the completion tests exercise all three shells.
          sudo apt-get install -y -qq tmux fzf shellcheck zsh fish
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          echo "--- versions ---"
          tmux -V; fzf --version; yq --version; zsh --version; fish --version; shellcheck --version | head -2

      - name: Syntax check
        run: bash -n bin/tsm

      - name: Shellcheck
        # Gate on error-level only. Warning/info findings (e.g. SC2155, SC2034)
        # are advisory here and intentionally not blocking; revisit if we choose
        # to tighten the bar later.
        run: shellcheck --severity=error bin/tsm test/*.sh

      - name: Run test suite
        run: test/run_all.sh
